name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS project
        run: npx expo prebuild -p ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS app
        run: |
          cd ios
          xcodebuild -workspace lonehero.xcworkspace \
                     -scheme lonehero \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY=""

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/lonehero.app Payload/
          zip -r LoneHero.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: LoneHero-IPA
          path: LoneHero.ipa
