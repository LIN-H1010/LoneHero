name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS project
        run: npx expo prebuild -p ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS app
        run: |
          cd ios
          # Disable code signing for Pods
          sed -i '' "s/config.build_settings\['CODE_SIGNING_REQUIRED'\] = 'YES'/config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'/g" Pods/Pods.xcodeproj/project.pbxproj || true
          sed -i '' "s/config.build_settings\['CODE_SIGNING_ALLOWED'\] = 'YES'/config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'/g" Pods/Pods.xcodeproj/project.pbxproj || true
          
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "Building $WORKSPACE with scheme $SCHEME"
          
          set -o pipefail
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -destination "generic/platform=iOS" \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     | tee xcodebuild.log

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Build-Log
          path: ios/xcodebuild.log

      - name: Package to IPA
        run: |
          cd ios
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../LoneHero.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoneHero-IPA
          path: LoneHero.ipa
